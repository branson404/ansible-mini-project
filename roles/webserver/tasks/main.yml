---
# tasks file for webserver

- name: Update package cache (Ubuntu)
  apt:
    update_cache: yes
  become: yes
  when: ansible_os_family == "Debian"

- name: Update yum cache (CentOS)
  yum:
    update_cache: yes
  become: yes
  when: ansible_os_family == "RedHat"

- name: Install Node.js (Ubuntu)
  apt:
    name: nodejs
    state: present
  become: yes
  when: ansible_os_family == "Debian"

- name: Install Node.js (CentOS)
  yum:
    name: nodejs
    state: present
  become: yes
  when: ansible_os_family == "RedHat"

- name: Install npm (Ubuntu)
  apt:
    name: npm
    state: present
  become: yes
  when: ansible_os_family == "Debian"

- name: Install git
  package:
    name: git
    state: present
  become: yes

- name: Install Nginx (Ubuntu)
  apt:
    name: nginx
    state: present
  become: yes
  when: ansible_os_family == "Debian"

- name: Install Nginx (CentOS)
  yum:
    name: nginx
    state: present
  become: yes
  when: ansible_os_family == "RedHat"

- name: Start Nginx service
  systemd:
    name: nginx
    state: started
    enabled: yes
  become: yes

- name: Remove existing repo directory
  file:
    path: /tmp/mern-stack-todo
    state: absent
  become: yes

- name: Clone the repository
  git:
    repo: https://github.com/jvlcode/mern-stack-todo
    dest: /tmp/mern-stack-todo
    version: main
  become: yes

- name: Replace backend api
  replace:
    path: /tmp/mern-stack-todo/todo-frontend/src/Todo.js
    regexp: 'const apiUrl = "http://13.60.186.181:8000"'
    replace: 'const apiUrl = ""'
  become: yes

- name: Install frontend dependencies
  npm:
    path: /tmp/mern-stack-todo/todo-frontend
    state: present
  become: yes

- name: Build frontend
  command: npm run build
  args:
    chdir: /tmp/mern-stack-todo/todo-frontend
  become: yes

- name: Create directory for frontend
  file:
    path: /var/www/mern-todo/todo-frontend
    state: directory
    recurse: yes
  become: yes

- name: Copy frontend build
  copy:
    src: /tmp/mern-stack-todo/todo-frontend/build/
    dest: /var/www/mern-todo/todo-frontend/build/
    remote_src: yes
  become: yes

- name: Configure Nginx
  template:
    src: templates/nginx.conf.j2
    dest: /etc/nginx/sites-available/default
    backup: yes
  become: yes
  notify: restart nginx
  when: ansible_os_family == "Debian"

- name: Configure Nginx (CentOS)
  template:
    src: templates/nginx.conf.j2
    dest: /etc/nginx/conf.d/default.conf
    backup: yes
  become: yes
  notify: restart nginx
  when: ansible_os_family == "RedHat"

- name: Test Nginx configuration
  command: nginx -t
  become: yes

- name: Reload Nginx
  systemd:
    name: nginx
    state: reloaded
  become: yes
